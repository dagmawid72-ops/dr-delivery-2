<!DOCTYPE html>
<html lang="en">
<head>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet"><link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">  
<meta charset="UTF-8">
<title>DR Fruit Delivery</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="landing-page">

<div class="fruit" style="left:10%">🍎</div>
<div class="fruit" style="left:30%">🍊</div>
<div class="fruit" style="left:50%">🍉</div>
<div class="fruit" style="left:70%">🍓</div>
<div class="fruit" style="left:90%">🍍</div>
<div class="landing-container">
  <h1>DR FRUIT DELIVERY</h1>
  <div class="landing-emojis">🍌🥑🍎</div>
  <button onclick="window.location.href='mainpage.html'">ORDER NOW</button>
  <p class="contact">Phone: 0912345677</p>
  <p class="creator">Name:Dagmawi Dawit</p>
  <div class="bottom-emojis">THE BEST DELIVERY WEBSITES</div>
</div>
<script>

document.querySelectorAll("a").forEach(link => {
link.addEventListener("click", function(e){

e.preventDefault();

document.body.classList.add("fade-out");

setTimeout(()=>{
window.location = this.href;
},500);

});
});

</script>
<script>

document.querySelectorAll(".product").forEach(card=>{
card.addEventListener("click",()=>{
card.style.transform="scale(0.95)";

setTimeout(()=>{
card.style.transform="scale(1)";
},150);

});
});

</script>
</body>

</html>
